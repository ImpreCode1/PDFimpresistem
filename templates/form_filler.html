<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rellenar formulario — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-8">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-2xl">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Rellenar formulario</h1>
        <p class="text-gray-500 text-sm mb-6">Archivo: <span class="font-medium text-gray-700">{{ pdf_nombre }}</span></p>

        <form action="/form_filler/guardar" method="POST" class="space-y-4">
            <input type="hidden" name="pdf_nombre" value="{{ pdf_nombre }}">

            {% for campo in campos %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ campo.nombre }}
                </label>

                {% if campo.tipo == 2 %}
                    <!-- Checkbox -->
                    <input
                        type="checkbox"
                        name="{{ campo.nombre }}"
                        {% if campo.valor_actual %}checked{% endif %}
                        class="w-5 h-5 text-blue-600">

                {% else %}
                    <!-- Texto -->
                    <input
                        type="text"
                        name="{{ campo.nombre }}"
                        value="{{ campo.valor_actual }}"
                        class="w-full border border-gray-300 rounded-xl py-2 px-4 text-gray-700 focus:outline-none focus:border-blue-400">
                {% endif %}
            </div>
            {% endfor %}

            <div class="flex gap-3 pt-4">
                <a href="/"
                    class="flex-1 text-center border border-gray-300 text-gray-600 font-semibold py-3 px-6 rounded-xl hover:bg-gray-50 transition">
                    Cancelar
                </a>
                <button type="submit"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition">
                    Guardar PDF
                </button>
            </div>
        </form>
    </div>
</body>
</html>
