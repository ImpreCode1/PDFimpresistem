<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparar PDF — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Comparar PDF</h1>
        
        <!-- Upload Section -->
        <div id="uploadSection" class="grid grid-cols-2 gap-6 mb-6">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">PDF Original</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-purple-400 transition-colors cursor-pointer" id="dropZone1">
                    <input type="file" id="pdf1" accept=".pdf" class="hidden">
                    <label for="pdf1" class="cursor-pointer">
                        <svg class="w-12 h-12 mx-auto mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-gray-500" id="fileName1">Arrastra o selecciona un PDF</p>
                    </label>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg p-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">PDF Nuevo</h2>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:border-purple-400 transition-colors cursor-pointer" id="dropZone2">
                    <input type="file" id="pdf2" accept=".pdf" class="hidden">
                    <label for="pdf2" class="cursor-pointer">
                        <svg class="w-12 h-12 mx-auto mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p class="text-gray-500" id="fileName2">Arrastra o selecciona un PDF</p>
                    </label>
                </div>
            </div>
        </div>

        <div class="text-center mb-8">
            <button type="button" id="compareBtn" onclick="comparePDFs()" disabled
                class="bg-purple-600 hover:bg-purple-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-8 rounded-xl transition-all duration-200">
                Comparar
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-purple-600 border-t-transparent"></div>
            <p class="text-gray-600 mt-4">Analizando diferencias...</p>
        </div>

        <!-- Results -->
        <div id="results" class="hidden">
            <div class="bg-white rounded-xl shadow-lg p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">
                        Comparando <span id="resultFile1" class="text-purple-600"></span> 
                        vs 
                        <span id="resultFile2" class="text-purple-600"></span>
                    </h2>
                    <div class="flex gap-2">
                        <button type="button" onclick="downloadReport()" 
                            class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg text-sm">
                            Descargar reporte HTML
                        </button>
                        <button type="button" onclick="resetForm()" 
                            class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg text-sm">
                            Nueva comparación
                        </button>
                    </div>
                </div>
                
                <!-- Legend -->
                <div class="flex gap-4 mb-4 text-sm">
                    <span class="flex items-center gap-1"><span class="w-4 h-4 bg-green-200 rounded"></span> Texto agregado</span>
                    <span class="flex items-center gap-1"><span class="w-4 h-4 bg-red-200 rounded"></span> Texto eliminado</span>
                    <span class="flex items-center gap-1"><span class="w-4 h-4 bg-yellow-200 rounded"></span> Texto modificado</span>
                </div>

                <!-- Diff Table -->
                <div id="diffContainer" class="overflow-auto max-h-[600px] border rounded-lg"></div>
            </div>
        </div>
    </div>

    <script>
        let pdf1File = null;
        let pdf2File = null;
        let compareResult = null;

        const pdf1Input = document.getElementById('pdf1');
        const pdf2Input = document.getElementById('pdf2');
        const compareBtn = document.getElementById('compareBtn');

        pdf1Input.addEventListener('change', function() {
            if (this.files[0]) {
                pdf1File = this.files[0];
                document.getElementById('fileName1').textContent = pdf1File.name;
                updateCompareBtn();
            }
        });

        pdf2Input.addEventListener('change', function() {
            if (this.files[0]) {
                pdf2File = this.files[0];
                document.getElementById('fileName2').textContent = pdf2File.name;
                updateCompareBtn();
            }
        });

        function updateCompareBtn() {
            compareBtn.disabled = !(pdf1File && pdf2File);
        }

        async function comparePDFs() {
            if (!pdf1File || !pdf2File) return;

            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('results').classList.add('hidden');

            const formData = new FormData();
            formData.append('pdf_file_1', pdf1File);
            formData.append('pdf_file_2', pdf2File);

            try {
                const response = await fetch('/api/compare', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    resetForm();
                    return;
                }

                compareResult = data;
                document.getElementById('resultFile1').textContent = data.file1;
                document.getElementById('resultFile2').textContent = data.file2;
                document.getElementById('diffContainer').innerHTML = data.html;

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('results').classList.remove('hidden');
            } catch (e) {
                console.error('Error:', e);
                alert('Error al comparar archivos');
                resetForm();
            }
        }

        function downloadReport() {
            if (!compareResult) return;

            const blob = new Blob([compareResult.html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `comparacion_${compareResult.file1}_vs_${compareResult.file2}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function resetForm() {
            pdf1File = null;
            pdf2File = null;
            compareResult = null;
            pdf1Input.value = '';
            pdf2Input.value = '';
            document.getElementById('fileName1').textContent = 'Arrastra o selecciona un PDF';
            document.getElementById('fileName2').textContent = 'Arrastra o selecciona un PDF';
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('results').classList.add('hidden');
            compareBtn.disabled = true;
        }
    </script>
</body>
</html>
