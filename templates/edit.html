<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar PDF — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        #editCanvas {
            border: 1px solid #e5e7eb;
        }
        .tool-active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-80 bg-white border-r border-gray-200 p-5 flex flex-col overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-4">Editar PDF</h1>
            
            <!-- Upload PDF -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Archivo PDF</label>
                <input type="file" id="pdfInput" accept=".pdf" 
                    class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">
            </div>

            <!-- Page Selector -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Página</label>
                <input type="number" id="pageNum" value="1" min="1" 
                    class="w-full border border-gray-300 rounded-xl py-2 px-3 text-gray-700 focus:outline-none focus:border-indigo-400">
                <p id="pageCountDisplay" class="text-xs text-gray-500 mt-1 hidden">de <span id="totalPages">1</span> páginas</p>
            </div>

            <!-- Tool Selector -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Herramienta</label>
                <div class="flex gap-2">
                    <button type="button" id="toolText" onclick="selectTool('text')"
                        class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-3 rounded-lg text-sm tool-active">
                        T Texto
                    </button>
                </div>
            </div>

            <!-- Text Settings -->
            <div class="mb-4 space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Tamaño de fuente</label>
                    <input type="number" id="fontSize" value="12" min="6" max="72" 
                        class="w-full border border-gray-300 rounded-lg py-2 px-3 text-gray-700 focus:outline-none focus:border-indigo-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Color</label>
                    <input type="color" id="textColor" value="#000000" 
                        class="w-full h-10 border border-gray-300 rounded-lg cursor-pointer">
                </div>
            </div>

            <!-- Annotation List -->
            <div class="mb-4 flex-1 overflow-auto">
                <label class="block text-sm font-medium text-gray-700 mb-2">Anotaciones</label>
                <div id="annotationList" class="space-y-2">
                    <p class="text-xs text-gray-400">Haz clic en el canvas para agregar texto</p>
                </div>
            </div>

            <!-- Hidden input -->
            <input type="hidden" name="anotaciones" id="anotaciones_input">

            <!-- Buttons -->
            <button type="button" id="saveBtn" onclick="saveChanges()" disabled
                class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl mb-2 transition-all duration-200">
                Guardar cambios
            </button>

            <!-- Download Link -->
            <div id="downloadArea" class="mt-4 hidden">
                <h3 class="text-lg font-bold text-green-700 mb-2">PDF editado</h3>
                <a id="downloadLink" href="#" download class="text-blue-600 hover:underline">
                    Descargar PDF
                </a>
            </div>
        </div>

        <!-- Main Canvas Area -->
        <div class="flex-1 p-5 overflow-auto flex items-center justify-center bg-gray-100">
            <div class="bg-white rounded-xl shadow-lg p-4">
                <canvas id="editCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let canvas;
        let pdfBase64 = null;
        let canvasWidth = 595;
        let canvasHeight = 842;
        let currentPage = 1;
        let totalPages = 1;
        let pageAnnotations = {};
        let currentTool = 'text';

        const pdfInput = document.getElementById('pdfInput');
        const pageNum = document.getElementById('pageNum');
        const pageCountDisplay = document.getElementById('pageCountDisplay');
        const totalPagesSpan = document.getElementById('totalPages');
        const fontSizeInput = document.getElementById('fontSize');
        const textColorInput = document.getElementById('textColor');
        const annotationList = document.getElementById('annotationList');
        const saveBtn = document.getElementById('saveBtn');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');

        function initCanvas() {
            canvas = new fabric.Canvas('editCanvas', {
                selection: true
            });
            canvas.setDimensions({ width: canvasWidth, height: canvasHeight });
            canvas.renderAll();

            canvas.on('mouse:down', function(options) {
                if (currentTool === 'text' && !options.target) {
                    const pointer = canvas.getPointer(options.e);
                    addText(pointer.x, pointer.y);
                }
            });
        }

        function addText(x, y) {
            const text = new fabric.IText('Texto', {
                left: x,
                top: y,
                fontSize: parseInt(fontSizeInput.value) || 12,
                fill: textColorInput.value,
                fontFamily: 'Arial'
            });
            
            text.on('changed', function() {
                updateAnnotationList();
            });
            
            canvas.add(text);
            canvas.setActiveObject(text);
            text.enterEditing();
            updateAnnotationList();
        }

        function selectTool(tool) {
            currentTool = tool;
            document.getElementById('toolText').classList.toggle('tool-active', tool === 'text');
        }

        async function fetchPagePreview() {
            if (!pdfInput.files[0]) return;
            
            const formData = new FormData();
            formData.append('pdf_file', pdfInput.files[0]);
            formData.append('pagina', pageNum.value);
            
            try {
                const response = await fetch('/api/page_preview', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.image) {
                    pdfBase64 = data.image;
                    const img = new Image();
                    img.onload = function() {
                        const maxW = 800, maxH = 800;
                        let scale = Math.min(maxW / img.width, maxH / img.height, 1);
                        canvasWidth = img.width * scale;
                        canvasHeight = img.height * scale;
                        canvas.setDimensions({ width: canvasWidth, height: canvasHeight });
                        loadPageAnnotations();
                    };
                    img.src = pdfBase64;
                    saveBtn.disabled = false;
                }
            } catch (e) {
                console.error('Error fetching page preview:', e);
            }
        }

        function saveCurrentPageAnnotations() {
            const objects = canvas.getObjects().filter(o => o.type === 'i-text');
            pageAnnotations[currentPage] = objects.map(obj => ({
                left: obj.left,
                top: obj.top,
                text: obj.text,
                fontSize: obj.fontSize,
                fill: obj.fill,
                width: obj.width,
                height: obj.height,
                scaleX: obj.scaleX,
                scaleY: obj.scaleY
            }));
        }

        function loadPageAnnotations() {
            canvas.clear();
            
            if (pdfBase64) {
                fabric.Image.fromURL(pdfBase64, function(img) {
                    canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                        scaleX: canvasWidth / img.width,
                        scaleY: canvasHeight / img.height
                    });
                    
                    restoreAnnotations();
                });
            } else {
                canvas.renderAll();
            }
        }

        function restoreAnnotations() {
            if (pageAnnotations[currentPage]) {
                pageAnnotations[currentPage].forEach(data => {
                    const text = new fabric.IText(data.text, {
                        left: data.left,
                        top: data.top,
                        fontSize: data.fontSize,
                        fill: data.fill,
                        fontFamily: 'Arial',
                        scaleX: data.scaleX || 1,
                        scaleY: data.scaleY || 1
                    });
                    
                    text.on('changed', function() {
                        updateAnnotationList();
                    });
                    
                    canvas.add(text);
                });
            }
            updateAnnotationList();
        }

        function switchPage(newPage) {
            saveCurrentPageAnnotations();
            currentPage = parseInt(newPage);
            document.getElementById('pageNum').value = currentPage;
            fetchPagePreview();
        }

        function updateAnnotationList() {
            const objects = canvas.getObjects().filter(o => o.type === 'i-text');
            
            if (objects.length === 0) {
                annotationList.innerHTML = '<p class="text-xs text-gray-400">Haz clic en el canvas para agregar texto</p>';
                return;
            }
            
            annotationList.innerHTML = '';
            
            Object.keys(pageAnnotations).forEach(page => {
                const pageAnns = pageAnnotations[page];
                pageAnns.forEach((ann, idx) => {
                    const item = document.createElement('div');
                    item.className = 'text-xs bg-gray-50 p-2 rounded border border-gray-200';
                    
                    const pageBadge = document.createElement('span');
                    pageBadge.className = 'inline-block bg-blue-100 text-blue-700 px-1 rounded mr-1';
                    pageBadge.textContent = 'P' + page;
                    
                    const textPreview = document.createElement('span');
                    textPreview.className = 'text-gray-600';
                    textPreview.textContent = ann.text.substring(0, 30) + (ann.text.length > 30 ? '...' : '');
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'float-right text-red-500 hover:text-red-700';
                    deleteBtn.innerHTML = '×';
                    deleteBtn.onclick = function() {
                        deleteAnnotation(page, idx);
                    };
                    
                    item.appendChild(pageBadge);
                    item.appendChild(textPreview);
                    item.appendChild(deleteBtn);
                    annotationList.appendChild(item);
                });
            });
        }

        function deleteAnnotation(page, idx) {
            if (pageAnnotations[page]) {
                pageAnnotations[page].splice(idx, 1);
            }
            
            if (parseInt(page) === currentPage) {
                loadPageAnnotations();
            } else {
                updateAnnotationList();
            }
        }

        async function saveChanges() {
            if (!pdfInput.files[0]) return;
            
            saveCurrentPageAnnotations();
            
            const annotations = [];
            
            Object.keys(pageAnnotations).forEach(page => {
                const pageAnns = pageAnnotations[page];
                if (pageAnns && pageAnns.length > 0) {
                    pageAnns.forEach(ann => {
                        const pos_x = (ann.left / canvasWidth) * 100;
                        const pos_y = (ann.top / canvasHeight) * 100;
                        
                        annotations.push({
                            pagina: parseInt(page),
                            texto: ann.text,
                            pos_x: Math.round(pos_x),
                            pos_y: Math.round(pos_y),
                            fontsize: ann.fontSize,
                            color: ann.fill
                        });
                    });
                }
            });
            
            if (annotations.length === 0) {
                alert('No hay anotaciones para guardar');
                return;
            }
            
            const formData = new FormData();
            formData.append('pdf_file', pdfInput.files[0]);
            formData.append('anotaciones', JSON.stringify(annotations));
            
            try {
                const response = await fetch('/edit', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(result, 'text/html');
                    const link = doc.querySelector('a[download]');
                    
                    if (link) {
                        downloadLink.href = link.href;
                        downloadLink.download = link.download;
                        downloadArea.classList.remove('hidden');
                    }
                }
            } catch (e) {
                console.error('Error saving PDF:', e);
            }
        }

        pdfInput.addEventListener('change', function() {
            if (this.files[0]) {
                pageAnnotations = {};
                currentPage = 1;
                pageNum.value = 1;
                fetchPagePreview();
            }
        });

        pageNum.addEventListener('change', function() {
            if (pdfInput.files[0] && this.value > 0) {
                switchPage(this.value);
            }
        });

        fontSizeInput.addEventListener('change', function() {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set('fontSize', parseInt(this.value));
                canvas.renderAll();
                updateAnnotationList();
            }
        });

        textColorInput.addEventListener('change', function() {
            const activeObj = canvas.getActiveObject();
            if (activeObj && activeObj.type === 'i-text') {
                activeObj.set('fill', this.value);
                canvas.renderAll();
                updateAnnotationList();
            }
        });

        initCanvas();
    </script>
</body>
</html>
