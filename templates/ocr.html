<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>OCR PDF — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-1/3 bg-white border-r border-gray-200 p-5 flex flex-col overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-4">OCR PDF</h1>
            
            <!-- Upload Area -->
            <div id="uploadSection" class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Archivo PDF</label>
                <input type="file" id="pdfInput" accept=".pdf" 
                    class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-cyan-50 file:text-cyan-700 hover:file:bg-cyan-100">
            </div>

            <!-- Progress (Phase 1) -->
            <div id="progressSection" class="mb-4 hidden">
                <div class="bg-cyan-50 rounded-xl p-4">
                    <p class="text-sm font-medium text-cyan-700 mb-2" id="progressText">Procesando página...</p>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div id="progressBar" class="bg-cyan-600 h-3 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Page Selector (Phase 2) -->
            <div id="pageSection" class="mb-4 hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">Página</label>
                <input type="number" id="pageNum" value="1" min="1" 
                    class="w-full border border-gray-300 rounded-xl py-2 px-3 text-gray-700 focus:outline-none focus:border-cyan-400">
            </div>

            <!-- Canvas Preview (Phase 2) -->
            <div id="canvasSection" class="flex-1 hidden">
                <div class="bg-gray-100 rounded-xl p-2 flex items-center justify-center">
                    <canvas id="ocrCanvas"></canvas>
                </div>
            </div>

            <!-- Download Button (Phase 2) -->
            <div id="downloadSection" class="mt-4 hidden">
                <button type="button" id="downloadBtn" onclick="downloadOCR()"
                    class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200">
                    Descargar PDF con OCR
                </button>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="flex-1 p-5 overflow-y-auto">
            <!-- Phase 1: Streaming Text -->
            <div id="streamingSection">
                <h2 class="text-lg font-semibold text-gray-800 mb-3">Texto extraído</h2>
                <p class="text-sm text-gray-500 mb-4">El texto se extraerá página por página...</p>
                <div id="pagesContainer" class="space-y-3"></div>
            </div>

            <!-- Phase 2: Editable Text -->
            <div id="editableSection" class="hidden">
                <h2 class="text-lg font-semibold text-gray-800 mb-3">Texto editable</h2>
                <p class="text-sm text-gray-500 mb-4">Puedes corregir el texto extraído antes de generar el PDF</p>
                <div id="editablePages" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        let pdfFilename = '';
        let totalPages = 0;
        let extractedTexts = {};
        let currentPhase = 1;
        let canvas;
        let pdfBase64 = null;

        const pdfInput = document.getElementById('pdfInput');
        const progressSection = document.getElementById('progressSection');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const pagesContainer = document.getElementById('pagesContainer');
        const streamingSection = document.getElementById('streamingSection');
        const editableSection = document.getElementById('editableSection');
        const pageSection = document.getElementById('pageSection');
        const canvasSection = document.getElementById('canvasSection');
        const downloadSection = document.getElementById('downloadSection');

        pdfInput.addEventListener('change', async function() {
            if (!this.files[0]) return;
            
            const file = this.files[0];
            
            const formData = new FormData();
            formData.append('pdf_file', file);
            
            try {
                const uploadRes = await fetch('/api/ocr/upload', {
                    method: 'POST',
                    body: formData
                });
                const uploadData = await uploadRes.json();
                
                if (uploadData.error) {
                    alert(uploadData.error);
                    return;
                }
                
                pdfFilename = uploadData.filename;
                totalPages = uploadData.total_pages;
                
                document.getElementById('uploadSection').classList.add('hidden');
                progressSection.classList.remove('hidden');
                
                startOCRStream();
            } catch (e) {
                console.error('Error uploading:', e);
                alert('Error al subir archivo');
            }
        });

        function startOCRStream() {
            const eventSource = new EventSource(`/api/ocr/stream?filename=${encodeURIComponent(pdfFilename)}`);
            
            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.error) {
                    alert('Error en OCR: ' + data.error);
                    eventSource.close();
                    return;
                }
                
                const page = data.page;
                const text = data.text;
                const done = data.done;
                
                extractedTexts[page] = text;
                
                updateStreamingUI(page, text, done);
                
                const percent = (page / totalPages) * 100;
                progressBar.style.width = percent + '%';
                progressText.textContent = `Procesando página ${page} de ${totalPages}`;
                
                if (done) {
                    eventSource.close();
                    setTimeout(() => startPhase2(), 500);
                }
            };
            
            eventSource.onerror = function() {
                eventSource.close();
                alert('Error en la conexión de streaming');
            };
        }

        function updateStreamingUI(page, text, done) {
            let pageDiv = document.getElementById('streaming-page-' + page);
            
            if (!pageDiv) {
                pageDiv = document.createElement('div');
                pageDiv.id = 'streaming-page-' + page;
                pageDiv.className = 'bg-white rounded-xl border border-gray-200 overflow-hidden';
                
                const header = document.createElement('button');
                header.className = 'w-full flex items-center justify-between p-3 text-left hover:bg-gray-50';
                header.innerHTML = `<span class="font-medium text-gray-700">Página ${page}</span>
                    <svg class="w-5 h-5 text-gray-400 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>`;
                
                const content = document.createElement('div');
                content.className = 'hidden p-3 border-t border-gray-100';
                content.id = 'streaming-content-' + page;
                
                const pre = document.createElement('pre');
                pre.className = 'text-sm text-gray-600 whitespace-pre-wrap';
                pre.textContent = text;
                content.appendChild(pre);
                
                header.onclick = function() {
                    content.classList.toggle('hidden');
                    header.querySelector('svg').classList.toggle('rotate-180');
                };
                
                pageDiv.appendChild(header);
                pageDiv.appendChild(content);
                pagesContainer.appendChild(pageDiv);
            } else {
                const content = document.getElementById('streaming-content-' + page);
                content.querySelector('pre').textContent = text;
            }
        }

        function startPhase2() {
            currentPhase = 2;
            
            progressSection.classList.add('hidden');
            streamingSection.classList.add('hidden');
            
            pageSection.classList.remove('hidden');
            canvasSection.classList.remove('hidden');
            downloadSection.classList.remove('hidden');
            editableSection.classList.remove('hidden');
            
            document.getElementById('pageNum').max = totalPages;
            
            renderEditablePages();
            initCanvas();
            loadPagePreview(1);
        }

        function renderEditablePages() {
            const container = document.getElementById('editablePages');
            container.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'bg-white rounded-xl border border-gray-200 p-4';
                
                const label = document.createElement('label');
                label.className = 'block text-sm font-medium text-gray-700 mb-2';
                label.textContent = `Página ${i}`;
                
                const textarea = document.createElement('textarea');
                textarea.className = 'w-full border border-gray-300 rounded-lg p-3 text-sm text-gray-700 focus:outline-none focus:border-cyan-400';
                textarea.rows = 6;
                textarea.value = extractedTexts[i] || '';
                textarea.id = 'edit-page-' + i;
                textarea.addEventListener('input', function() {
                    extractedTexts[i] = this.value;
                });
                
                pageDiv.appendChild(label);
                pageDiv.appendChild(textarea);
                container.appendChild(pageDiv);
            }
        }

        function initCanvas() {
            canvas = new fabric.Canvas('ocrCanvas', { selection: false });
            canvas.setDimensions({ width: 500, height: 700 });
            canvas.renderAll();
        }

        async function loadPagePreview(page) {
            if (!pdfFilename) return;
            
            const formData = new FormData();
            formData.append('pdf_nombre', pdfFilename);
            formData.append('pagina', page);
            
            try {
                const response = await fetch('/api/page_preview_by_name', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.image) {
                    const img = new Image();
                    img.onload = function() {
                        const scale = Math.min(500 / img.width, 700 / img.height, 1);
                        canvas.setDimensions({ width: img.width * scale, height: img.height * scale });
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                            scaleX: scale,
                            scaleY: scale
                        });
                    };
                    img.src = data.image;
                }
            } catch (e) {
                console.error('Error loading preview:', e);
            }
        }

        document.getElementById('pageNum').addEventListener('change', function() {
            const page = parseInt(this.value);
            if (page >= 1 && page <= totalPages) {
                loadPagePreview(page);
            }
        });

        async function downloadOCR() {
            if (!pdfFilename) return;
            
            const formData = new FormData();
            formData.append('pdf_file', pdfFilename);
            
            try {
                const response = await fetch('/ocr', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(result, 'text/html');
                    const link = doc.querySelector('a[download]');
                    
                    if (link) {
                        window.location.href = link.href;
                    }
                }
            } catch (e) {
                console.error('Error downloading:', e);
            }
        }
    </script>
</body>
</html>
