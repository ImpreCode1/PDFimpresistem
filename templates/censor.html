<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Censurar PDF — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        #zoneCanvas {
            border: 2px dashed #d1d5db;
            cursor: crosshair;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-80 bg-white border-r border-gray-200 p-5 flex flex-col overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-4">Censurar PDF</h1>
            
            <!-- Upload PDF -->
            <div class="space-y-3">
                <label class="block text-sm font-medium text-gray-700">Archivo PDF</label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center
                            hover:border-indigo-400 transition-colors cursor-pointer"
                    onclick="document.getElementById('pdf_file_censor').click()">
                    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-sm text-gray-500" id="censor_filename">
                        Seleccionar archivo PDF
                    </p>
                </div>
                <input type="file" id="pdf_file_censor" accept=".pdf" class="hidden">
            </div>

            <!-- Page Selector -->
            <div class="mb-4 mt-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Página</label>
                <input type="number" id="pagina" value="1" min="1" 
                    class="w-full border border-gray-300 rounded-xl py-2 px-3 text-gray-700 focus:outline-none focus:border-gray-400">
            </div>

            <!-- Color Picker -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Color de censura</label>
                <input type="color" id="colorPicker" value="#000000" 
                    class="w-full h-10 border border-gray-300 rounded-xl cursor-pointer">
            </div>

            <!-- Zones List -->
            <div class="mb-4 flex-1 overflow-y-auto" style="min-height: 100px;">
                <label class="block text-sm font-medium text-gray-700 mb-2">Zonas dibujadas</label>
                <div id="zonesList" class="space-y-2 max-h-48 overflow-y-auto">
                    <p class="text-sm text-gray-400 italic">Sin zonas</p>
                </div>
            </div>

            <!-- Submit Button - sticky to bottom -->
            <div class="sticky bottom-0 bg-white pt-3 mt-auto">
                <form id="censorForm" action="/censor" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="pdf_file" id="pdfFileHidden">
                    <input type="hidden" name="pagina" id="paginaHidden" value="1">
                    <input type="hidden" name="zonas" id="zonasHidden">
                    <input type="hidden" name="color" id="colorHidden" value="#000000">
                    <button type="button" id="submitBtn" disabled
                        class="w-full bg-gray-700 hover:bg-gray-800 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200">
                        Aplicar censura
                    </button>
                </form>
            </div>
        </div>

            <!-- Main Canvas Area -->
        <div class="flex-1 p-5 overflow-auto flex items-center justify-center bg-gray-100">
            <div class="bg-white rounded-xl shadow-lg p-4">
                <canvas id="zoneCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let canvas;
        let pdfBase64 = null;
        let currentPage = 1;
        let zones = [];
        let isDrawing = false;
        let startX, startY;
        let tempRect = null;
        let pdfFileName = '';
        let currentFile = null;

        const canvasEl = document.getElementById('zoneCanvas');
        const pdfInput = document.getElementById('pdf_file_censor');
        const pageNum = document.getElementById('pagina');
        const colorPicker = document.getElementById('colorPicker');
        const zonesList = document.getElementById('zonesList');
        const submitBtn = document.getElementById('submitBtn');
        const censorForm = document.getElementById('censorForm');
        const zonasHidden = document.getElementById('zonasHidden');
        const paginaHidden = document.getElementById('paginaHidden');
        const colorHidden = document.getElementById('colorHidden');
        const pdfFileHidden = document.getElementById('pdfFileHidden');

        function initCanvas() {
            canvas = new fabric.Canvas('zoneCanvas', {
                selection: false,
                isDrawingMode: false
            });
            
            canvas.setDimensions({ width: 595, height: 842 });
            canvas.renderAll();

            canvas.on('mouse:down', function(opt) {
                if (!pdfBase64) return;
                isDrawing = true;
                const pointer = canvas.getPointer(opt.e);
                startX = pointer.x;
                startY = pointer.y;
                tempRect = new fabric.Rect({
                    left: startX, top: startY, width: 0, height: 0,
                    fill: colorPicker.value + '80',
                    stroke: colorPicker.value, strokeWidth: 2,
                    selectable: false, evented: false
                });
                canvas.add(tempRect);
            });

            canvas.on('mouse:move', function(opt) {
                if (!isDrawing || !tempRect) return;
                const pointer = canvas.getPointer(opt.e);
                const w = pointer.x - startX;
                const h = pointer.y - startY;
                tempRect.set({
                    width: Math.abs(w), height: Math.abs(h),
                    left: w < 0 ? pointer.x : startX,
                    top: h < 0 ? pointer.y : startY
                });
                canvas.renderAll();
            });

            canvas.on('mouse:up', function() {
                if (!isDrawing || !tempRect) return;
                isDrawing = false;
                const cw = canvas.getWidth();
                const ch = canvas.getHeight();
                const zone = {
                    x0: Math.round(tempRect.left / cw * 100),
                    y0: Math.round(tempRect.top / ch * 100),
                    x1: Math.round((tempRect.left + tempRect.width) / cw * 100),
                    y1: Math.round((tempRect.top + tempRect.height) / ch * 100)
                };
                if (Math.abs(zone.x1 - zone.x0) < 1 || Math.abs(zone.y1 - zone.y0) < 1) {
                    canvas.remove(tempRect);
                    tempRect = null;
                    return;
                }
                tempRect.zoneData = zone;
                zones.push(zone);
                tempRect = null;
                updateZonesList();
            });
        }

        document.getElementById('pdf_file_censor').addEventListener('change', async function() {
            if (!this.files || this.files.length === 0) return;

            const file = this.files[0];
            currentFile = file;

            document.getElementById('censor_filename').textContent = file.name;
            pdfFileName = file.name;
            pdfFileHidden.value = file.name;

            await renderPage(file, 1);
        });

        document.getElementById('pagina').addEventListener('change', function() {
            const file = document.getElementById('pdf_file_censor').files[0];
            if (file) renderPage(file, parseInt(this.value) || 1);
        });

        async function renderPage(file, pageNum) {
            const formData = new FormData();
            formData.append('pdf_file', file);
            formData.append('pagina', pageNum);

            try {
                const response = await fetch('/api/page_preview', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.image) {
                    fabric.Image.fromURL(data.image, function(img) {
                        canvas.setWidth(img.width);
                        canvas.setHeight(img.height);
                        canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas), {
                            scaleX: canvas.width / img.width,
                            scaleY: canvas.height / img.height
                        });
                    });
                    currentPage = pageNum;
                    paginaHidden.value = currentPage;
                    pdfBase64 = data.image;
                } else {
                    console.error('No image in response:', data);
                }
            } catch (err) {
                console.error('Error calling /api/page_preview:', err);
                alert('Error al cargar el PDF. Verifica que el servidor esté corriendo.');
            }
        }

        function updateColor() {
            const color = colorPicker.value;
            colorHidden.value = color;
            canvas.getObjects().forEach(obj => {
                if (obj.stroke) {
                    obj.set('stroke', color);
                    obj.set('fill', color + '80');
                }
            });
            canvas.renderAll();
        }

        function updateZonesList() {
            if (zones.length === 0) {
                zonesList.innerHTML = '<p class="text-sm text-gray-400 italic">Sin zonas</p>';
            } else {
                zonesList.innerHTML = zones.map((z, i) => `
                    <div class="flex items-center justify-between bg-gray-50 rounded-lg py-2 px-3">
                        <span class="text-sm text-gray-700">Zona ${i + 1}: ${z.x0}%, ${z.y0}% → ${z.x1}%, ${z.y1}%</span>
                        <button type="button" onclick="removeZone(${i})" class="text-red-500 hover:text-red-700 text-lg">❌</button>
                    </div>
                `).join('');
            }
            
            zonasHidden.value = zones.map(z => `${z.x0},${z.y0},${z.x1},${z.y1}`).join('\n');
            submitBtn.textContent = `Aplicar censura (${zones.length} zona${zones.length !== 1 ? 's' : ''})`;
            submitBtn.disabled = zones.length === 0 || !pdfBase64;
        }

        function removeZone(index) {
            zones.splice(index, 1);
            const objects = canvas.getObjects();
            while (objects.length > 0) {
                canvas.remove(objects[0]);
            }
            zones.forEach(z => {
                const rect = new fabric.Rect({
                    left: z.x0 / 100 * canvas.getWidth(),
                    top: z.y0 / 100 * canvas.getHeight(),
                    width: (z.x1 - z.x0) / 100 * canvas.getWidth(),
                    height: (z.y1 - z.y0) / 100 * canvas.getHeight(),
                    fill: colorPicker.value + '80',
                    stroke: colorPicker.value,
                    strokeWidth: 2,
                    selectable: false,
                    evented: false
                });
                rect.zoneData = z;
                canvas.add(rect);
            });
            updateZonesList();
canvas.renderAll();
        }

        colorPicker.addEventListener('input', updateColor);

        document.getElementById('submitBtn').addEventListener('click', async function() {
            if (!currentFile || zones.length === 0) return;
            const formData = new FormData();
            formData.append('pdf_file', currentFile);
            formData.append('pagina', document.getElementById('pagina').value);
            formData.append('zonas', document.getElementById('zonasHidden').value);
            formData.append('color', colorPicker.value);
            this.disabled = true;
            this.textContent = 'Procesando...';
            try {
                const response = await fetch('/censor', { method: 'POST', body: formData });
                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'censurado.pdf';
                    a.click();
                } else {
                    alert('Error al procesar el PDF');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                this.disabled = false;
                this.textContent = `Aplicar censura (${zones.length} zona${zones.length !== 1 ? 's' : ''})`;
            }
        });

        initCanvas();
    </script>
</body>
</html>
