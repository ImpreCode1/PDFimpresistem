<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Unir PDFs — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.15.349/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.15.349/pdf.worker.min.js';
    </script>
    <style>
        .file-item {
            cursor: grab;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .file-item:active {
            cursor: grabbing;
        }
        .file-item.sortable-ghost {
            opacity: 0.5;
        }
        .file-item.sortable-chosen {
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-80 bg-white border-r border-gray-200 p-5 flex flex-col overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-4">Unir PDFs</h1>
            
            <!-- Upload PDF -->
            <div class="space-y-3">
                <label class="block text-sm font-medium text-gray-700">Archivos PDF</label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center 
                            hover:border-blue-400 transition-colors cursor-pointer"
                     onclick="document.getElementById('pdf_files_unir').click()">
                    <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" 
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <p class="text-sm text-gray-500" id="unir_filename">
                        Seleccionar archivos PDF
                    </p>
                </div>
                <input type="file" id="pdf_files_unir" accept=".pdf" multiple class="hidden">
                
                <button type="button" onclick="document.getElementById('pdf_files_unir').click()"
                    class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded-lg text-sm">
                    + Agregar más PDFs
                </button>
            </div>

            <!-- File Count -->
            <div id="fileCount" class="mb-4 text-sm text-gray-600 hidden">
                <span id="fileCountNum">0</span> archivos seleccionados
            </div>

            <!-- Files List -->
            <div class="mb-4 flex-1 overflow-y-auto" style="max-height: 200px;">
                <div id="filesList" class="space-y-2">
                    <!-- Files will be inserted here -->
                </div>
                <div id="emptyFilesList" class="text-center text-gray-400 py-4 text-sm">
                    No hay archivos
                </div>
            </div>

            <!-- Buttons -->
            <div class="space-y-2">
                <button type="button" id="unirBtn" disabled
                    class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200">
                    Unir PDFs
                </button>
                <button type="button" id="clearBtn"
                    class="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-lg text-sm">
                    Limpiar lista
                </button>
            </div>

            <!-- Download Area -->
            <div id="downloadArea" class="mt-4 hidden">
                <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                    <p class="text-green-700 font-semibold mb-3">¡PDFs unidos exitosamente!</p>
                    <a id="downloadLink" href="#" download
                        class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors">
                        Descargar PDF
                    </a>
                </div>
            </div>
        </div>

        <!-- Right Panel: Thumbnails Grid -->
        <div class="flex-1 p-5 overflow-auto">
            <h2 class="text-lg font-semibold text-gray-800 mb-3">Vista previa (arrastra para reordenar)</h2>
            <div id="thumbnailGrid" class="grid grid-cols-3 gap-4">
                <!-- Thumbnails will be inserted here -->
            </div>
            <div id="emptyState" class="text-center text-gray-400 py-20">
                Sube PDFs para ver las miniaturas
            </div>
        </div>
    </div>

    <script>
        let files = [];
        let sortable = null;
        let pdfDoc = null;

        const pdfFilesInput = document.getElementById('pdf_files_unir');
        const filesList = document.getElementById('filesList');
        const emptyFilesList = document.getElementById('emptyFilesList');
        const fileCount = document.getElementById('fileCount');
        const fileCountNum = document.getElementById('fileCountNum');
        const unirBtn = document.getElementById('unirBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadArea = document.getElementById('downloadArea');
        const downloadLink = document.getElementById('downloadLink');
        const thumbnailGrid = document.getElementById('thumbnailGrid');
        const emptyState = document.getElementById('emptyState');

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function updateFilesList() {
            fileCountNum.textContent = files.length;
            
            if (files.length > 0) {
                fileCount.classList.remove('hidden');
                emptyFilesList.classList.add('hidden');
                filesList.classList.remove('hidden');
            } else {
                fileCount.classList.add('hidden');
                emptyFilesList.classList.remove('hidden');
                filesList.classList.add('hidden');
            }

            filesList.innerHTML = files.map((file, index) => `
                <div class="file-item flex items-center justify-between bg-gray-50 rounded-lg p-2" data-index="${index}">
                    <div class="flex items-center gap-2 flex-1 min-w-0">
                        <svg class="w-5 h-5 text-red-500 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4z"/>
                        </svg>
                        <div class="flex-1 min-w-0">
                            <p class="text-xs text-gray-800 truncate" title="${file.name}">${file.name}</p>
                            <p class="text-xs text-gray-500">${formatFileSize(file.size)}</p>
                        </div>
                    </div>
                    <button type="button" onclick="removeFile('${file.id}')" class="text-red-500 hover:text-red-700 text-lg ml-1 flex-shrink-0">❌</button>
                </div>
            `).join('');

            // Destroy old sortable
            if (sortable) {
                try { sortable.destroy(); } catch(e) {}
                sortable = null;
            }

            // Initialize Sortable
            if (files.length > 1) {
                sortable = new Sortable(filesList, {
                    animation: 150,
                    ghostClass: 'sortable-ghost',
                    chosenClass: 'sortable-chosen',
                    handle: '.file-item',
                    onEnd: function(evt) {
                        const item = files.splice(evt.oldIndex, 1)[0];
                        files.splice(evt.newIndex, 0, item);
                        updateFilesList();
                    }
                });
            }

            // Update button state
            unirBtn.disabled = files.length < 2;

            // Update thumbnails
            updateThumbnailGrid();

            // Hide download area if files changed
            downloadArea.classList.add('hidden');
        }

        function removeFile(id) {
            files = files.filter(f => f.id != id);
            updateFilesList();
        }

        async function updateThumbnailGrid() {
            if (files.length > 0) {
                emptyState.classList.add('hidden');
            } else {
                emptyState.classList.remove('hidden');
                thumbnailGrid.innerHTML = '';
                return;
            }

            thumbnailGrid.innerHTML = '';

            for (const [index, fileObj] of files.entries()) {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow p-2';
                card.dataset.index = index;

                const canvas = document.createElement('canvas');
                canvas.width = 120;
                canvas.height = 160;
                canvas.className = 'w-full rounded';

                const nameLabel = document.createElement('p');
                nameLabel.className = 'text-xs text-gray-600 text-center mt-2 truncate';
                nameLabel.textContent = fileObj.name;

                card.appendChild(canvas);
                card.appendChild(nameLabel);
                thumbnailGrid.appendChild(card);

                try {
                    const arrayBuffer = await fileObj.file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const page = await pdf.getPage(1);

                    const viewport = page.getViewport({ scale: 0.3 });
                    canvas.height = (viewport.height / viewport.width) * 120;

                    await page.render({
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    }).promise;
                } catch (e) {
                    canvas.getContext('2d').fillStyle = '#f3f4f6';
                    canvas.getContext('2d').fillRect(0, 0, canvas.width, canvas.height);
                }
            }
        }

        pdfFilesInput.addEventListener('change', function() {
            if (!this.files || this.files.length === 0) return;

            const newFiles = Array.from(this.files).filter(f => {
                if (f.size > 30 * 1024 * 1024) {
                    alert(`El archivo "${f.name}" supera el límite de 30 MB y no se agregó.`);
                    return false;
                }
                return true;
            });
            if (newFiles.length === 0) { this.value = ''; return; }

            files = [...files, ...newFiles.map((f, i) => ({
                file: f,
                id: Date.now() + i,
                name: f.name,
                size: f.size
            }))];

            document.getElementById('unir_filename').textContent = `${files.length} archivos seleccionados`;

            updateFilesList();

            this.value = '';
        });

        clearBtn.addEventListener('click', function() {
            files = [];
            document.getElementById('unir_filename').textContent = 'Seleccionar archivos PDF';
            downloadArea.classList.add('hidden');
            updateFilesList();
        });

        unirBtn.addEventListener('click', async function() {
            if (files.length < 2) return;
            
            this.disabled = true;
            this.textContent = 'Uniendo PDFs...';
            
            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                
                for (const fileObj of files) {
                    const fileData = await fileObj.file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(fileData, { ignoreEncryption: true });
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                
                const mergedPdfBytes = await mergedPdf.save();
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                downloadLink.href = url;
                downloadLink.download = 'PDF_unido.pdf';
                downloadArea.classList.remove('hidden');
                
            } catch (e) {
                alert('Error al unir PDFs: ' + e.message);
            }
            
            this.disabled = files.length < 2;
            this.textContent = 'Unir PDFs';
        });
    </script>
</body>
</html>
