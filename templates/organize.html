<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Organizar PDF — PDF Impresistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .thumbnail-card {
            transition: all 0.2s ease;
        }
        .thumbnail-card:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- Left Panel -->
        <div class="w-80 bg-white border-r border-gray-200 p-5 flex flex-col overflow-y-auto">
            <h1 class="text-xl font-bold text-gray-800 mb-4">Organizar PDF</h1>
            
            <!-- Upload PDF -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Archivo PDF</label>
                <div class="border-2 border-dashed border-gray-300 rounded-xl p-4 text-center hover:border-gray-400 transition-colors cursor-pointer">
                    <input type="file" id="pdfInput" accept=".pdf" class="hidden">
                    <label for="pdfInput" class="cursor-pointer">
                        <svg class="w-8 h-8 mx-auto mb-2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <p id="uploadLabel" class="text-sm text-gray-500">Seleccionar PDF</p>
                    </label>
                </div>
                <button type="button" onclick="document.getElementById('pdfInput').click()" class="mt-2 w-full bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 px-4 rounded-lg text-sm">
                    Seleccionar archivo
                </button>
            </div>

            <!-- Page Count -->
            <div id="pageCount" class="mb-4 text-sm text-gray-600 hidden">
                <span id="pageCountNum">0</span> páginas
            </div>

            <!-- Selection Summary -->
            <div id="selectionSummary" class="mb-4 text-sm text-gray-600 hidden">
                <span id="selectedCount">0</span> de <span id="totalCount">0</span> páginas marcadas para eliminar
            </div>

            <!-- Warning -->
            <div id="warningArea" class="mb-4 text-sm text-red-600 hidden">
                No puedes eliminar todas las páginas
            </div>

            <!-- Hidden input -->
            <input type="hidden" name="paginas" id="paginas_input">

            <!-- Buttons - sticky to bottom -->
            <div class="sticky bottom-0 bg-white pt-3 mt-auto">
                <button type="button" id="deleteBtn" onclick="deletePages()" disabled
                    class="w-full bg-red-600 hover:bg-red-700 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-semibold py-3 px-6 rounded-xl mb-2 transition-all duration-200">
                    Eliminar páginas
                </button>
                
                <button type="button" id="clearBtn" onclick="clearSelection()" disabled
                    class="w-full bg-gray-200 hover:bg-gray-300 disabled:bg-gray-100 disabled:cursor-not-allowed text-gray-700 font-medium py-2 px-4 rounded-lg text-sm transition-all duration-200">
                    Deseleccionar todo
                </button>
            </div>

            <!-- Download Link -->
            <div id="downloadArea" class="mt-4 hidden">
                <h3 class="text-lg font-bold text-green-700 mb-2">PDF organizado</h3>
                <a id="downloadLink" href="#" download class="text-blue-600 hover:underline">
                    Descargar PDF
                </a>
            </div>
        </div>

        <!-- Main: Thumbnails Grid -->
        <div class="flex-1 p-5 overflow-auto">
            <h2 class="text-lg font-semibold text-gray-800 mb-3">Selecciona las páginas a eliminar</h2>
            <div id="thumbnailGrid" class="grid grid-cols-3 gap-4">
                <!-- Thumbnails will be inserted here -->
            </div>
            <div id="emptyState" class="text-center text-gray-400 py-20">
                Sube un PDF para ver las páginas
            </div>
        </div>
    </div>

    <script>
        let pdfInput = document.getElementById('pdfInput');
        let thumbnailGrid = document.getElementById('thumbnailGrid');
        let emptyState = document.getElementById('emptyState');
        let deleteBtn = document.getElementById('deleteBtn');
        let clearBtn = document.getElementById('clearBtn');
        let pageCount = document.getElementById('pageCount');
        let pageCountNum = document.getElementById('pageCountNum');
        let selectionSummary = document.getElementById('selectionSummary');
        let selectedCount = document.getElementById('selectedCount');
        let totalCount = document.getElementById('totalCount');
        let warningArea = document.getElementById('warningArea');
        let downloadArea = document.getElementById('downloadArea');
        let downloadLink = document.getElementById('downloadLink');
        let paginasInput = document.getElementById('paginas_input');
        
        let thumbnails = [];
        let selectedPages = new Set();

        pdfInput.addEventListener('change', async function() {
            if (!this.files[0]) return;
            
            document.getElementById('uploadLabel').textContent = this.files[0].name;
            
            const formData = new FormData();
            formData.append('pdf_file', this.files[0]);
            
            try {
                const response = await fetch('/api/thumbnails', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.thumbnails) {
                    thumbnails = data.thumbnails;
                    selectedPages.clear();
                    renderThumbnails();
                    
                    pageCountNum.textContent = thumbnails.length;
                    totalCount.textContent = thumbnails.length;
                    pageCount.classList.remove('hidden');
                    selectionSummary.classList.remove('hidden');
                    emptyState.classList.add('hidden');
                    updateButtons();
                }
            } catch (e) {
                console.error('Error loading thumbnails:', e);
            }
        });

        function renderThumbnails() {
            thumbnailGrid.innerHTML = '';
            
            thumbnails.forEach((thumb, index) => {
                const pageNum = index + 1;
                const card = document.createElement('div');
                card.className = 'thumbnail-card relative cursor-pointer rounded-lg overflow-hidden border-2 border-gray-200 hover:border-red-300';
                card.dataset.page = pageNum;
                
                const img = document.createElement('img');
                img.src = thumb;
                img.className = 'w-full h-32 object-cover';
                img.alt = 'Página ' + pageNum;
                
                const badge = document.createElement('div');
                badge.className = 'absolute bottom-0 left-0 right-0 flex justify-center p-2 bg-gradient-to-t from-black/60 to-transparent';
                
                const badgeText = document.createElement('span');
                badgeText.className = 'text-xs text-white bg-gray-600/80 px-2 py-1 rounded';
                badgeText.dataset.for = 'badge';
                badgeText.textContent = 'Página ' + pageNum;
                
                badge.appendChild(badgeText);
                
                card.appendChild(img);
                card.appendChild(badge);
                
                card.addEventListener('click', function() {
                    togglePage(pageNum);
                });
                
                thumbnailGrid.appendChild(card);
            });
        }

        function togglePage(pageNum) {
            if (selectedPages.has(pageNum)) {
                selectedPages.delete(pageNum);
            } else {
                selectedPages.add(pageNum);
            }
            updateCards();
            updateButtons();
        }

        function updateCards() {
            const cards = thumbnailGrid.querySelectorAll('.thumbnail-card');
            
            cards.forEach(card => {
                const pageNum = parseInt(card.dataset.page);
                const isSelected = selectedPages.has(pageNum);
                const badge = card.querySelector('[data-for="badge"]');
                
                if (isSelected) {
                    card.classList.remove('border-gray-200');
                    card.classList.add('border-red-500');
                    
                    const overlay = document.createElement('div');
                    overlay.className = 'absolute inset-0 bg-red-500 bg-opacity-40 flex items-center justify-center';
                    overlay.dataset.for = 'overlay';
                    
                    const trashIcon = document.createElement('svg');
                    trashIcon.className = 'w-8 h-8 text-white';
                    trashIcon.setAttribute('fill', 'none');
                    trashIcon.setAttribute('stroke', 'currentColor');
                    trashIcon.setAttribute('viewBox', '0 0 24 24');
                    trashIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>';
                    
                    overlay.appendChild(trashIcon);
                    card.appendChild(overlay);
                    
                    badge.classList.add('line-through');
                } else {
                    card.classList.add('border-gray-200');
                    card.classList.remove('border-red-500');
                    
                    const overlay = card.querySelector('[data-for="overlay"]');
                    if (overlay) overlay.remove();
                    
                    badge.classList.remove('line-through');
                }
            });
            
            selectedCount.textContent = selectedPages.size;
        }

        function updateButtons() {
            const total = thumbnails.length;
            const selected = selectedPages.size;
            
            deleteBtn.disabled = selected === 0 || selected === total;
            clearBtn.disabled = selected === 0;
            
            if (selected === total && total > 0) {
                warningArea.classList.remove('hidden');
            } else {
                warningArea.classList.add('hidden');
            }
            
            paginasInput.value = Array.from(selectedPages).join(',');
        }

        function clearSelection() {
            selectedPages.clear();
            updateCards();
            updateButtons();
        }

        async function deletePages() {
            if (!pdfInput.files[0]) return;
            
            const selected = selectedPages.size;
            const total = thumbnails.length;
            
            if (selected === 0 || selected === total) {
                return;
            }
            
            const formData = new FormData();
            formData.append('pdf_file', pdfInput.files[0]);
            formData.append('paginas', paginasInput.value);
            
            try {
                const response = await fetch('/organize', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const result = await response.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(result, 'text/html');
                    const link = doc.querySelector('a[download]');
                    
                    if (link) {
                        downloadLink.href = link.href;
                        downloadLink.download = link.download;
                        downloadArea.classList.remove('hidden');
                    }
                }
            } catch (e) {
                console.error('Error deleting pages:', e);
            }
        }
    </script>
</body>
</html>
